#####-----神经网络参数-----#####
yolo_name: "yolov5"
yolo_type: "yolov5"
classify_model: "assets/tiny_resnet.engine"
yolo11_model_path: "assets/yolo11.xml"
yolov8_model_path: "assets/yolov8.engine"
yolov5_model_path: "assets/yolov5.engine" 
device: "GPU"
min_confidence: 0.8
use_traditional: false  # 用原生 bool 类型

#####-----ROI-----#####
roi: 
  x: 420
  y: 50
  width: 600
  height: 600

use_roi: false

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----tracker参数-----#####
min_detect_count: 5
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset:  -8 #degree -2.5 -YOU +ZUO
pitch_offset: -3 # degree 2 -下 +上
comming_angle: 60 # degree
leaving_angle: 20

 # degree
decision_speed: 8 # rad/s
high_speed_delay_time: 0.04 # s
low_speed_delay_time: 0.12 # s

#####-----phase jump guard-----#####
use_phase_jump_guard: false
phase_jump_score_thresh: 0.45      # 匹配分数低于该阈值时，允许解释为“跳板”
phase_jump_guard_time: 0.05        # s，切板后这段时间内认为“recent jump”
phase_jump_dist_R_scale: 3.0       # 跳板帧放大量测距离噪声
phase_jump_angle_R_scale: 4.0      # 跳板帧放大量测装甲板朝向噪声

#####-----ultra spin fire gate-----#####
use_ultra_spin_fire_gate: false
ultra_spin_speed: 7               # rad/s，超过后进入极高速保守开火
ultra_spin_fire_thresh_ratio: 0.3  # 极高速时 fire_thresh 额外收紧
ultra_spin_post_switch_hold_time: 0.10   # s，切板后额外停火时间
ultra_spin_coming_angle: 60        # degree，进入窗口角
ultra_spin_leaving_angle: 20       # degree，离开窗口角

#####-----shooter参数-----#####
first_tolerance: 2.8 # 近距射击容差，degree
second_tolerance: 0.5 # 远距离射击容差，degree
judge_distance: 2 #距离判断阈值
auto_fire: true # 是否由自瞄控制射击

enable_switch_forbid: false   # 是否启用切板禁射
switch_forbid_frames: 10     # 切板后禁射帧数\

# camera_name: "hikrobot"
