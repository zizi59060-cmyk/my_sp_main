# R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

#####-----expert visualization-----#####
use_expert_visualization: true
show_detection_debug: true
show_selected_detected_armor: true
show_world_panel: false
show_plotter_expert_channels: true

world_panel_size: 300
world_panel_scale: 180

R_gimbal2imubody: [0, 1, 0, -1, 0, 0, 0, 0, 1] 

